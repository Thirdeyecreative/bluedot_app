name: bluedot_app
description: "BlueDot - Turn Climate Action into a Movement"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.3

  # Storage & Security
  flutter_secure_storage: ^10.0.0

  # UI & Fonts
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  percent_indicator: ^4.2.3

  # Camera & Media
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Location
  geolocator: ^14.0.0

  # QR Code
  qr_flutter: ^4.1.0

  # Networking
  http: ^1.2.2
  http_parser: ^4.0.2

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.20.1

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Links & Settings
  url_launcher: ^6.3.1
  skeletonizer: ^2.1.3
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/auth/
    - assets/images/home/
    - assets/images/scanner/
    - assets/images/action_hub/
    - assets/images/directory/
    - assets/images/map/
    - assets/images/profile/
    - assets/images/badges/
    - assets/images/onboarding/
    - assets/images/shared/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/shared/bluedot_icon_legacy.png"
  adaptive_icon_background: "#3C4FAF"
  adaptive_icon_foreground: "assets/images/shared/bluedot_icon_adaptive.png"
  min_sdk_android: 21
